<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Zero To Hero</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:#e5e7eb;
}

.container{
text-align:center;
padding:2rem;
max-width:700px;
}

h1{
font-size:2.6rem;
margin-bottom:.5rem;
background:linear-gradient(90deg,#00d2ff,#7b2ff7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.badge{
display:inline-block;
margin:1rem 0 2rem;
padding:.45rem 1.3rem;
border:1px solid #7b2ff7;
border-radius:999px;
font-size:.85rem;
letter-spacing:.05em;
color:#c4b5fd;
}

/* tech cards */

.cards{
display:flex;
gap:1rem;
justify-content:center;
flex-wrap:wrap;
margin-bottom:2rem;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
border-radius:12px;
padding:1.4rem 1.8rem;
min-width:150px;
flex:1;
backdrop-filter:blur(4px);
}

.card span{
display:block;
font-size:.72rem;
text-transform:uppercase;
letter-spacing:.1em;
color:#9ca3af;
margin-bottom:.4rem;
}

.card strong{
font-size:1.2rem;
color:#f9fafb;
}

/* pipeline section */

.pipeline{
margin-top:1rem;
display:flex;
justify-content:center;
gap:.6rem;
flex-wrap:wrap;
}

.step{
padding:.35rem .9rem;
font-size:.75rem;
border-radius:999px;
background:rgba(34,197,94,.15);
border:1px solid rgba(34,197,94,.35);
color:#86efac;
letter-spacing:.05em;
}

.footer{
margin-top:2rem;
font-size:.8rem;
color:#9ca3af;
opacity:.9;
}

</style>
</head>

<body>

<div class="container">

<h1>DevOps Zero To Hero</h1>

<div class="badge">Josh Batch 10</div>

<div class="cards">

<div class="card">
<span>Framework</span>
<strong>Flask 3.1</strong>
</div>

<div class="card">
<span>Runtime</span>
<strong>Python 3.14</strong>
</div>

<div class="card">
<span>Deploy</span>
<strong>AWS ECS</strong>
</div>

</div>

<div class="pipeline">

<div class="step">✔ Build</div>
<div class="step">✔ Lint</div>
<div class="step">✔ Test</div>
<div class="step">✔ Deploy</div>

</div>

<div class="footer">
Automated CI/CD with GitHub Actions
</div>

</div>

</body>
</html>
