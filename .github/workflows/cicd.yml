name: CICD

on:
  workflow_dispatch:
    inputs: 
      environment:
        description: This is the environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging


jobs:
  code:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout code 
        run: echo "This is cloning the code"
    
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps: 
      - name: build code
        run: echo "Docker container build"
  
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the code
        run: echo "Testing the code"
        
  deploy:
    if: inputs.environment == 'dev'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: code deploy
        run: echo "Code deployed"
  
