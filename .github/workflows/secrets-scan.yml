# API Keys, senstive data, credentials
name: Secrets scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with: 
                fetcj-depth: 0

            - name: Run GitLeak
              uses: gitleaks/gitleaks-actions@v2
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

            
              