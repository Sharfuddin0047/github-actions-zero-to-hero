name: Deploy To Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              
            - name: SSH to Prod server
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{secrets.EC2_SSH_HOST}}
                  username: ${{secrets.EC2_SSH_USER}}
                  key: ${{secrets.EC2_SSH_KEY}}
                  script: |
                      echo "Starting Deployment"
                      mkdir -p devops
                      sudo apt-get update
                      sudo apt-get install docker.io docker-compose-v2 -y
                      sudo usermod -aG docker $USER && newgrp docker
                      echo ${USER}

            - name: Copy docker-compose.yml to remote server
              uses: appleboy/scp-action@v0.1.3
              with:
                  host: ${{ secrets.EC2_SSH_HOST }}
                  username: ${{ secrets.EC2_SSH_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  source: "docker-compose.yml"
                  target: "~/devops"

            - name: SSH to prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_SSH_HOST }}
                  username: ${{ secrets.EC2_SSH_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "Running App"
                      echo ${USER}
                      export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
                      export DOCKER_TAG=${{ github.sha }}
                      echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ vars.DOCKERHUB_USER }} --password-stdin
                      cd ~/devops && docker compose down && docker compose up -d --build --force-recreate
